spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/meal_order_vnpost
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      repositories:
        enabled: false

  cache:
    type: redis

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

logging:
  level:
    org.springframework.web: DEBUG
    org.hibernate: INFO

jwt:
  signerKey: ${JWT_SIGNER_KEY}
  valid-duration: 300
  # valid-duration: 86400
  refreshable-duration: 3600
  remember-me-duration: 2592000

security:
  login-rate-limit:
    max-attempts: 5
    # max-attempts: 100000
    window-seconds: 300